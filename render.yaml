services:
  - type: web
    name: peg-backend
    env: python
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install --prefer-binary -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
